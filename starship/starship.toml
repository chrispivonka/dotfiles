# =============================================================================
# Starship prompt ã modern two-line prompt with GitHub Dark palette
# Docs: https://starship.rs/config/
# =============================================================================

palette = "github_dark"

format = """
$os $directory$git_branch$git_status$python$nodejs$dotnet$rust$golang$java$docker_context$aws$kubernetes$terraform$cmd_duration$jobs$character"""

right_format = ""

# --- OS icon -----------------------------------------------------------------
[os]
disabled = false
style = "fg:fg_muted"

[os.symbols]
Macos = ""
Linux = "ÞÏ"
Ubuntu = ""
Debian = ""

# --- Character (prompt symbol) -----------------------------------------------
[character]
success_symbol = "[](bold blue_bright)"
error_symbol = "[](bold red)"
vimcmd_symbol = "[](bold green)"

# --- Directory ---------------------------------------------------------------
[directory]
format = "[$path]($style)[$read_only]($read_only_style) "
style = "bold blue"
read_only = " µ¯ƒ"
read_only_style = "red"
truncation_length = 4
truncation_symbol = "ãÎ/"
truncate_to_repo = true

[directory.substitutions]
"Documents" = "µ¯ "
"Downloads" = " "
"Projects" = " "

# --- Git branch --------------------------------------------------------------
[git_branch]
format = "[$symbol$branch(:$remote_branch)]($style) "
symbol = " "
style = "bold purple"
truncation_length = 25

# --- Git status --------------------------------------------------------------
[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold orange"
conflicted = " ${count} "
ahead = " ${count} "
behind = " ${count} "
diverged = "  ${ahead_count}  ${behind_count} "
untracked = " ${count} "
stashed = " ${count} "
modified = " ${count} "
staged = " ${count} "
renamed = "µ¯ ${count} "
deleted = " ${count} "

# --- Languages ---------------------------------------------------------------
[python]
format = '[$symbol($version)]($style) '
symbol = " "
style = "yellow"

[nodejs]
format = '[$symbol($version)]($style) '
symbol = " "
style = "green"

[dotnet]
format = '[$symbol($version)( µ¯£ $tfm)]($style) '
symbol = "µ¯ "
style = "purple"

[rust]
format = '[$symbol($version)]($style) '
symbol = "µÝ "
style = "red"

[golang]
format = '[$symbol($version)]($style) '
symbol = " "
style = "cyan"

[java]
format = '[$symbol($version)]($style) '
symbol = " "
style = "red"

# --- Infrastructure ----------------------------------------------------------
[docker_context]
format = '[$symbol$context]($style) '
symbol = " "
only_with_files = true
style = "blue"

[aws]
format = '[$symbol$profile(\($region\))]($style) '
symbol = " "
style = "yellow"

[kubernetes]
format = '[$symbol$context(\($namespace\))]($style) '
symbol = "µÝƒ "
disabled = false
style = "cyan"
detect_files = ["k8s"]
detect_folders = ["k8s", ".kube"]

[terraform]
format = '[$symbol$workspace]($style) '
symbol = "µÝÂ "
style = "purple"

# --- Command duration --------------------------------------------------------
[cmd_duration]
min_time = 2000
format = '[ $duration]($style) '
style = "yellow"
show_milliseconds = false

# --- Background jobs ----------------------------------------------------------
[jobs]
format = '[$symbol$number]($style) '
symbol = "µÝñ "
style = "cyan"
number_threshold = 1

# --- Disabled (keep prompt fast) ---------------------------------------------
[package]
disabled = true

[battery]
disabled = true

# --- GitHub Dark Palette -----------------------------------------------------
[palettes.github_dark]
fg = "#e6edf3"
fg_muted = "#8b949e"
fg_subtle = "#6e7681"
bg = "#0d1117"
bg_subtle = "#161b22"
border = "#30363d"
red = "#ff7b72"
orange = "#f0883e"
yellow = "#d29922"
green = "#3fb950"
cyan = "#39c5cf"
blue = "#58a6ff"
blue_bright = "#79c0ff"
purple = "#bc8cff"
white = "#b1bac4"
