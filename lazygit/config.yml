# GitHub Dark theme — https://github.com/projekt0n/github-nvim-theme
gui:
  nerdFontsVersion: "3"
  theme:
    activeBorderColor:
      - "#58a6ff"
      - bold
    inactiveBorderColor:
      - "#8b949e"
    optionsTextColor:
      - "#79c0ff"
    selectedLineBgColor:
      - "#161b22"
    cherryPickedCommitBgColor:
      - "#39c5cf"
    cherryPickedCommitFgColor:
      - "#58a6ff"
    unstagedChangesColor:
      - "#ff7b72"
    defaultFgColor:
      - "#e6edf3"
    searchingActiveBorderColor:
      - "#d29922"
git:
  paging:
    colorArg: always
    pager: delta --dark --paging=never
