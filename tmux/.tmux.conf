# =============================================================================
# tmux configuration — modern, sensible defaults
# =============================================================================

# --- Prefix ------------------------------------------------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- General -----------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -sg escape-time 0
set -g history-limit 50000
set -g focus-events on
set -g status-interval 5
set -g detach-on-destroy off

# --- Vi mode -----------------------------------------------------------------
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# --- Pane navigation (vim-like) ----------------------------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Pane resizing -----------------------------------------------------------
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Splits (intuitive keys, keep current path) ------------------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# --- New window in current path ----------------------------------------------
bind c new-window -c "#{pane_current_path}"

# --- Reload config -----------------------------------------------------------
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# --- Status bar --------------------------------------------------------------
set -g status-position top
set -g status-style 'bg=default,fg=white'
set -g status-left '#[fg=blue,bold] #S  '
set -g status-right '#[fg=white,dim]%H:%M  %d %b '
set -g status-left-length 30
set -g status-right-length 50
setw -g window-status-current-format '#[fg=yellow,bold]#I:#W#{?window_zoomed_flag, 🔍,} '
setw -g window-status-format '#[fg=grey]#I:#W '

# --- Pane borders ------------------------------------------------------------
set -g pane-border-style 'fg=colour238'
set -g pane-active-border-style 'fg=cyan'

# --- Message styling ---------------------------------------------------------
set -g message-style 'fg=yellow,bold,bg=default'

# --- TPM (Tmux Plugin Manager) -----------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Plugin settings
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'

# --- Local overrides (not tracked in git) ------------------------------------
if-shell "[ -f ~/.tmux.local.conf ]" "source-file ~/.tmux.local.conf"

# Initialize TPM (keep at very bottom)
run '~/.tmux/plugins/tpm/tpm'
