title: dotfiles
description: Modern developer environment configuration for macOS and Ubuntu/Debian
remote_theme: just-the-docs/just-the-docs

url: ""
baseurl: ""

color_scheme: dark

# Search
search_enabled: true
search.heading_level: 3

# Navigation
nav_enabled: true

# Footer
footer_content: ""

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Markdown
markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

# Build settings
plugins:
  - jekyll-remote-theme

exclude:
  - install.sh
  - zsh/
  - git/
  - starship/
  - tmux/
  - nvim/
  - editorconfig/
  - ripgrep/
  - "*.local"
  - ".claude/"
